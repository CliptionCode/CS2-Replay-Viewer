syntax = "proto3";
package replay;
option go_package = "github.com/yourname/cs2-replay-viewer/backend/protobuf";

message ReplayData {
  DemoHeader header = 1;
  repeated PlayerInfo players = 2;
  repeated RoundData rounds = 3;
  repeated KillEvent kills = 4;
  repeated NadeEvent nades = 5;
  repeated PlayerFrame frames = 6;
  MapData map = 7;
  repeated FlashEvent flashes = 8;
  repeated NoiseEvent noises = 9;
  repeated BombEvent bombs = 10;
  repeated DroppedEquipment dropped_equipment = 11;
}

message DemoHeader {
  string map_name = 1;
  int32 tick_rate = 2;
  int32 total_ticks = 3;
  string server_name = 4;
  float playback_time = 5;
  float bomb_time_seconds = 6;
}

message PlayerInfo {
  uint64 steam_id = 1;
  string name = 2;
  int32 team = 3;
  int32 kills = 4;
  int32 deaths = 5;
  int32 assists = 6;
  float adr = 7;
  int32 kast = 8;
  int32 score = 9;
  int32 total_damage = 10;
}

message RoundData {
  int32 round_number = 1;
  int32 start_tick = 2;
  int32 end_tick = 3;
  int32 winner_team = 4;
  string win_reason = 5;
  int32 kill_count = 6;
  int32 freezetime_end_tick = 7;
}

message KillEvent {
  int32 tick = 1;
  uint64 killer_steam_id = 2;
  uint64 victim_steam_id = 3;
  string weapon = 4;
  bool is_headshot = 5;
  int32 penetrated_objects = 6;
  float killer_x = 7;
  float killer_y = 8;
  float victim_x = 9;
  float victim_y = 10;
  bool assisted_by_flash = 11;
  uint64 assister_steam_id = 12;
  bool attacker_blind = 13;
  bool killer_airborne = 14;
  bool no_scope = 15;
  bool through_smoke = 16;
}

message NadeEvent {
  int32 tick = 1;
  uint64 thrower_steam_id = 2;
  string nade_type = 3;
  float start_x = 4;
  float start_y = 5;
  float start_z = 6;
  float end_x = 7;
  float end_y = 8;
  float end_z = 9;
  repeated NadeTrajectoryPoint trajectory = 10;
  int32 detonation_tick = 11;
  int32 fade_tick = 12;
  float effect_radius = 13;
}

message NadeTrajectoryPoint {
  int32 tick = 1;
  float x = 2;
  float y = 3;
  float z = 4;
}

message PlayerFrame {
  int32 tick = 1;
  uint64 steam_id = 2;
  float x = 3;
  float y = 4;
  float z = 5;
  float yaw = 6;
  float pitch = 7;
  int32 health = 8;
  int32 armor = 9;
  string weapon = 10;
  bool is_alive = 11;
  repeated string utilities = 12;
  bool has_bomb = 13;
}

message FlashEvent {
  int32 tick = 1;
  uint64 player_steam_id = 2;
  uint64 attacker_steam_id = 3;
  float duration_seconds = 4;
  int32 end_tick = 5;
}

message NoiseEvent {
  int32 tick = 1;
  int32 end_tick = 2;
  uint64 steam_id = 3;
  float x = 4;
  float y = 5;
  float z = 6;
  float radius = 7;
  string noise_type = 8;
}

message BombEvent {
  int32 tick = 1;
  string event_type = 2;
  uint64 player_steam_id = 3;
  string site = 4;
  bool has_kit = 5;
}

message DroppedEquipment {
  int32 start_tick = 1;
  int32 end_tick = 2;
  string equipment_name = 3;
  string category = 4;
  float x = 5;
  float y = 6;
  float z = 7;
}

message MapData {
  string name = 1;
  double pos_x = 2;
  double pos_y = 3;
  double scale = 4;
  double rotate = 5;
  double zoom = 6;
  int32 width = 7;
  int32 height = 8;
}
